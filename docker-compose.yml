services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edu_backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://127.0.0.1:11434

  nginx:
    image: nginx:alpine
    container_name: edu_nginx
    restart: unless-stopped
    network_mode: host
    extra_hosts:
      - "ac-m2xheca-shard-00-00.cihvz39.mongodb.net:159.41.207.50"
      - "ac-m2xheca-shard-00-01.cihvz39.mongodb.net:159.41.207.76"
      - "ac-m2xheca-shard-00-02.cihvz39.mongodb.net:159.41.207.61"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
